  - generic [ref=e87]:
    - heading "Field Definitions" [level=2] [ref=e88]
    - generic [ref=e89]:
      - term [ref=e90]: ID
      - definition [ref=e91]: A unique identifier for the wiring leg (e.g., L-001).
      - term [ref=e92]: Typical
      - definition [ref=e93]: The number of identical, parallel wires in a single run (e.g., 4 for the 4 strings combined in a home run).
      - term [ref=e94]: Initial/Final Location
      - definition [ref=e95]: The start and end points of the wire run (e.g., PV Array to Junction Box).
      - term [ref=e96]: Conductor (Gauge/Type/Material)
      - definition [ref=e97]: The properties of the main current-carrying wires. Gauge is the size (AWG), Type is the insulation (e.g., THWN-2), and Material is Copper or Aluminum.
      - term [ref=e98]: Conduit
      - definition [ref=e99]: The nominal trade size of the conduit containing the wires (e.g., 3/4").
      - term [ref=e100]: "# of Parallel Circuits"
      - definition [ref=e101]: The number of separate circuits being run together.
      - term [ref=e102]: CCC (Current Carrying Conductors)
      - definition [ref=e103]: The total number of conductors in the conduit that generate heat (hots and neutrals). Used to calculate the Conduit Fill Factor.
      - term [ref=e104]: Fill %
      - definition [ref=e105]: The calculated percentage of the conduit's usable area that is filled by all wires, including the ground wire.
      - term [ref=e106]: OCPD (Overcurrent Protection Device)
      - definition [ref=e107]: The amperage rating of the circuit breaker or fuse protecting the circuit.
      - term [ref=e108]: EGC (Equipment Grounding Conductor)
      - definition [ref=e109]: The safety ground wire. Its size (Gauge) is determined by the OCPD rating, and its material is typically bare or insulated copper.
      - term [ref=e110]: Temp. Corr. (°C / Factor)
      - definition [ref=e111]: A derating factor applied to wire ampacity based on the ambient temperature where it is installed. The factor is calculated from the temperature based on NEC tables.
      - term [ref=e112]: Conduit Fill Factor
      - definition [ref=e113]: A derating factor applied when more than 3 CCCs are bundled in a conduit, accounting for heat buildup. It is calculated from the CCC value.
      - term [ref=e114]: Cont. Current (Continuous Current)
      - definition [ref=e115]: The expected, steady-state current the circuit will carry during normal operation.
      - term [ref=e116]: Max Current
      - definition [ref=e117]: For solar circuits, this is the value used to size wires and breakers, calculated as Continuous Current x 1.25 per NEC requirements.
      - term [ref=e118]: Base Amp
      - definition [ref=e119]: The maximum ampacity of the conductor in ideal conditions, based on its size and temperature rating, before any derating factors are applied.
      - term [ref=e120]: Derated Amp
      - definition [ref=e121]: The final, true ampacity of the conductor after applying all correction factors (temperature and conduit fill). This value must be greater than the Max Current.
      - term [ref=e122]: Term Temp (Terminal Temperature Rating)
      - definition [ref=e123]: The maximum temperature rating of the terminals the wire is connected to (usually 75°C for standard breakers).
      - term [ref=e124]: Length
      - definition [ref=e125]: The one-way length of the wire run in feet.
      - term [ref=e126]: VD % (Voltage Drop)
      - definition [ref=e127]: The percentage of voltage lost over the length of the wire due to resistance. Should typically be kept below 3%.